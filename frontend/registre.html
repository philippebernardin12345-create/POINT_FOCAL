<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POINT FOCAL</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="pwa/manifest.json">
</head>
<body>

<div class="container">

<h1>POINT FOCAL</h1>

<form id="registerForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Mot de passe" required>

<input type="password" id="confirmPassword" placeholder="Confirmation" required>

<button type="submit">
Créer un compte
</button>

</form>

</div>

<div id="importantPopup" class="popup hidden">

<div class="popup-content">

<h2>IMPORTANT</h2>

<p>
Regardez entièrement la vidéo.
Likez.
Commentez.
Partagez.

Ne partagez jamais directement
la vidéo YouTube.

Partagez uniquement votre lien
Point Focal personnel.
</p>

<div id="countdown">10</div>

<button id="watchVideoBtn" disabled>
Je regarde la vidéo
</button>

</div>

</div>

<script src="js/register.js"></script>
</body>
</html>
